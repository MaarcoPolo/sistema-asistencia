# ── Override de PRODUCCIÓN / servidor de pruebas ──────────────────────────────
# Invócalo junto al base, o fija COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Topología: el reverse proxy es Nginx Proxy Manager (NPM), que corre como
# contenedor Docker. Para que NPM alcance estos servicios SIN exponer puertos al
# host, los conectamos a la MISMA red Docker de NPM. NPM los resuelve por nombre
# de contenedor (asistencia-frontend / asistencia-backend) y enruta el tráfico.
#
# No se publica ningún puerto: el base ya no trae puertos, así que aquí solo
# añadimos la conexión a la red de NPM. (Por eso no se necesita "!reset".)
#
# ⚠️ Reemplaza "RED_DE_NPM" por el nombre real de la red de NPM. Obténlo con:
#   docker inspect nginx-proxy-manager-app-1 \
#     --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}'

services:
  # La BD no necesita la red de NPM: solo habla con el backend por la red interna.

  backend:
    networks:
      - default        # red interna del proyecto (para hablar con db)
      - npm            # red de NPM (para que el proxy lo alcance)

  frontend:
    networks:
      - default
      - npm
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api

# Conecta el stack a la red existente de NPM (definida fuera de este compose).
networks:
  npm:
    external: true
    name: RED_DE_NPM
