server {
    # Puerto >1024 para poder correr Nginx sin privilegios de root (ID-016).
    listen 8080;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Cabeceras de seguridad para el contenido servido (ID-014).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https:; font-src 'self' data:; frame-ancestors 'none'" always;

    # SPA: cualquier ruta desconocida cae a index.html para que React Router
    # gestione el enrutamiento del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cacheo agresivo de los assets versionados con hash por Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
