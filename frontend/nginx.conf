server {
    # Puerto >1024 para poder correr Nginx sin privilegios de root (ID-016).
    listen 8080;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Subidas de hasta ~6MB que permite el backend; damos un poco de margen.
    client_max_body_size 8m;

    # Cabeceras de seguridad para el contenido servido (ID-014).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https:; font-src 'self' data:; frame-ancestors 'none'" always;

    # ── Proxy de la API hacia el backend ──────────────────────────────────────
    # El ruteo de /api vive AQUÍ (en el repo), no en el reverse proxy externo,
    # para que sobreviva a cada redespliegue. El reverse proxy (NPM) solo necesita
    # apuntar a este contenedor; este reenvía /api/ al backend por nombre de red.
    #
    # Se usa el DNS interno de Docker (127.0.0.11) con una variable para que la
    # resolución del nombre 'asistencia-backend' sea diferida (en tiempo de
    # petición, no al arrancar): así el frontend levanta aunque el backend aún
    # no esté listo, y se reconecta solo si el backend cambia de IP.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream http://asistencia-backend:8080;
        # Se pasa $request_uri explícito para conservar la ruta completa
        # (/api/...) al usar proxy_pass con variable.
        proxy_pass $backend_upstream$request_uri;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: cualquier ruta desconocida cae a index.html para que React Router
    # gestione el enrutamiento del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cacheo agresivo de los assets versionados con hash por Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
