# ── Perfil de PRODUCCIÓN ───────────────────────────────────────────────────────
# Actívalo con: --spring.profiles.active=prod
# Las siguientes propiedades sobreescriben application.properties en producción.

# ── Base de datos ──────────────────────────────────────────────────────────────
# Las credenciales DEBEN venir de variables de entorno; no se definen aquí.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── Hibernate / JPA ────────────────────────────────────────────────────────────
# Deshabilitar logging de SQL para evitar fuga de datos en logs de producción.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Hibernate / pool ───────────────────────────────────────────────────────────
# Libera la conexión del pool al terminar la capa de servicio (PERF-005).
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=20000

# ── Logging ────────────────────────────────────────────────────────────────────
# Solo nivel WARN para seguridad en producción; DEBUG expone tokens y headers.
logging.level.org.springframework.security=WARN
logging.level.org.springframework=WARN
logging.level.mx.gob.sedif=INFO

# ── CORS (solo dominio real; sobreescribible por variable de entorno) ───────────
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:https://asistencia.sedif.gob.mx}

# ── Multipart / tamaño de subida ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ── Caché (Caffeine) ───────────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# ── Actuator (restringido a health, sin detalles) ──────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Errores: nunca exponer stack trace ni mensaje interno al cliente ────────────
server.error.include-stacktrace=never
server.error.include-message=never

# ── Cabeceras reenviadas por el proxy (Nginx) para obtener IP/esquema reales ────
server.forward-headers-strategy=framework
