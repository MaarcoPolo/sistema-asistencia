spring.application.name=asistencia-backend

# ── Base de datos ──────────────────────────────────────────────────────────────
# Las credenciales se leen de variables de entorno para evitar que queden
# expuestas en el control de versiones. En desarrollo se pueden definir en
# un archivo .env o en las variables de entorno del sistema operativo.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/asistencia_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:pass123}

# ── Hibernate / JPA ────────────────────────────────────────────────────────────
# "validate" verifica que el esquema coincide con las entidades; Flyway gestiona DDL.
spring.jpa.hibernate.ddl-auto=validate
# show-sql activo solo en desarrollo; se desactiva en el perfil "prod".
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=asistencia
# Libera la conexión del pool al terminar la capa de servicio en lugar de retenerla
# durante el render de la respuesta (PERF-005). El mapeo a DTO ya ocurre dentro de
# @Transactional en los servicios, por lo que es seguro.
spring.jpa.open-in-view=false

# ── Pool de conexiones (HikariCP) ──────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=20000

# ── Flyway ─────────────────────────────────────────────────────────────────────
spring.flyway.schemas=asistencia

# ── JWT ────────────────────────────────────────────────────────────────────────
# El secreto debe tener al menos 32 caracteres para HS256.
# En producción se inyecta como variable de entorno JWT_SECRET.
app.jwt.secret=${JWT_SECRET:esta-es-una-clave-secreta-MUY-larga-y-dificil-de-adivinar-para-mi-sistema}
app.jwt.expiration-ms=3600000
# Expiración del refresh token: 7 días en milisegundos.
app.jwt.refresh-expiration-ms=604800000

# ── Logging (desarrollo) ───────────────────────────────────────────────────────
# En producción se desactiva con el perfil "prod".
logging.level.org.springframework.security=DEBUG

# ── CORS ───────────────────────────────────────────────────────────────────────
# Origen del frontend permitido. En producción se sobreescribe en el perfil prod.
app.cors.allowed-origin=http://localhost:5173

# ── Multipart / tamaño de subida ───────────────────────────────────────────────
# Acota el tamaño de los Excel de carga masiva y de los payloads con foto base64.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ── Caché (Caffeine) ───────────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# ── Actuator (desarrollo: más visibilidad) ─────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized