spring.application.name=asistencia-backend

# ── Base de datos ──────────────────────────────────────────────────────────────
# Las credenciales se leen de variables de entorno para evitar que queden
# expuestas en el control de versiones. En desarrollo se pueden definir en
# un archivo .env o en las variables de entorno del sistema operativo.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/asistencia_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:pass123}

# ── Hibernate / JPA ────────────────────────────────────────────────────────────
# "validate" verifica que el esquema coincide con las entidades; Flyway gestiona DDL.
spring.jpa.hibernate.ddl-auto=validate
# show-sql activo solo en desarrollo; se desactiva en el perfil "prod".
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=asistencia

# ── Flyway ─────────────────────────────────────────────────────────────────────
spring.flyway.schemas=asistencia

# ── JWT ────────────────────────────────────────────────────────────────────────
# El secreto debe tener al menos 32 caracteres para HS256.
# En producción se inyecta como variable de entorno JWT_SECRET.
app.jwt.secret=${JWT_SECRET:esta-es-una-clave-secreta-MUY-larga-y-dificil-de-adivinar-para-mi-sistema}
app.jwt.expiration-ms=3600000
# Expiración del refresh token: 7 días en milisegundos.
app.jwt.refresh-expiration-ms=604800000

# ── Logging (desarrollo) ───────────────────────────────────────────────────────
# En producción se desactiva con el perfil "prod".
logging.level.org.springframework.security=DEBUG