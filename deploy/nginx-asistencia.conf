# ── Reverse proxy del host para sistema-asistencia ────────────────────────────
# Copiar a /etc/nginx/sites-available/asistencia en el servidor, reemplazando
# IP_SERVIDOR por la IP real. Luego:
#   sudo ln -s /etc/nginx/sites-available/asistencia /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Reenvía:
#   /api/  -> contenedor backend  (127.0.0.1:8080)
#   /      -> contenedor frontend (127.0.0.1:8081)

server {
    listen 80;
    server_name IP_SERVIDOR;

    # Subidas de hasta 6MB que permite el backend; damos un poco de margen.
    client_max_body_size 8m;

    # API -> contenedor backend
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Todo lo demás -> contenedor frontend (Nginx interno de la SPA)
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
