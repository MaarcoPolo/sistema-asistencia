version: '3.8'
services:
  db:
    image: postgres:17-alpine
    container_name: asistencia-db
    environment:
      POSTGRES_DB: asistencia_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./mi_respaldo.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: asistencia-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/asistencia_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: pass123
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: asistencia-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: