# Las credenciales se inyectan desde un archivo .env local (no commitear).
# Copiar .env.example a .env y ajustar los valores antes de levantar.

services:
  db:
    image: postgres:17-alpine
    container_name: asistencia-db
    environment:
      POSTGRES_DB: ${DB_NAME:-asistencia_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # Los puertos publicados NO se definen aquí: dependen del entorno.
    #   - Local:      docker-compose.local.yml  (expone a tu PC)
    #   - Servidor:   docker-compose.prod.yml   (sin puertos; vía red de NPM)
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Healthcheck para que el backend espere a que la BD esté lista.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-asistencia_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Límite de memoria para que un pico no afecte al host (PERF-007).
    mem_limit: 512m
    cpus: 1.0

  backend:
    build: ./backend
    container_name: asistencia-backend
    # Puertos definidos por entorno (ver nota en el servicio db).
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-asistencia_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # La JVM respeta el límite del contenedor y usa hasta el 75% para el heap (PERF-007).
      JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.0

  frontend:
    build: ./frontend
    container_name: asistencia-frontend
    # Nginx interno escucha en 8080 (sin root, ID-016). Puertos publicados por
    # entorno (ver nota en el servicio db).
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

volumes:
  pgdata: